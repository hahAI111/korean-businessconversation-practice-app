<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c9a96e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Korean Biz Coach — Login</title>
  <link rel="stylesheet" href="/static/style.css?v=3">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand-icon">🇰🇷</div>
      <h1>Korean Biz Coach</h1>
      <p class="subtitle">Business Korean Speaking Coach</p>

      <div id="authError" class="auth-error"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-full" id="loginBtn">Login</button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form id="registerForm" style="display:none;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Nickname</label>
          <input type="text" id="regNickname" placeholder="Your nickname">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 chars" required minlength="6">
        </div>
        <div class="form-group">
          <label>Korean Level</label>
          <select id="regLevel">
            <option value="beginner">Beginner (TOPIK 1-2)</option>
            <option value="intermediate" selected>Intermediate (TOPIK 3-4)</option>
            <option value="advanced">Advanced (TOPIK 5-6)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-full" id="regBtn">Register</button>
      </form>

      <p class="auth-toggle">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" id="toggleAuth">Register</a>
      </p>
    </div>
  </div>

  <script>
    // If already logged in, redirect to chat
    if (localStorage.getItem('token')) {
      window.location.href = '/static/chat.html';
    }

    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const toggleAuth = document.getElementById('toggleAuth');
    const toggleText = document.getElementById('toggleText');
    const authError = document.getElementById('authError');
    let isLogin = true;

    toggleAuth.addEventListener('click', (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      loginForm.style.display = isLogin ? 'block' : 'none';
      registerForm.style.display = isLogin ? 'none' : 'block';
      toggleText.textContent = isLogin ? 'Don\'t have an account?' : 'Already have an account?';
      toggleAuth.textContent = isLogin ? 'Register' : 'Login';
      authError.textContent = '';
    });

    async function apiCall(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Request failed');
      return data;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      authError.textContent = '';
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const data = await apiCall('/api/auth/login', {
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value,
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('userId', data.user_id);
        window.location.href = '/static/chat.html';
      } catch (err) {
        authError.textContent = err.message;
      } finally {
        btn.disabled = false; btn.textContent = 'Login';
      }
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      authError.textContent = '';
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Registering...';
      try {
        const data = await apiCall('/api/auth/register', {
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          nickname: document.getElementById('regNickname').value,
          korean_level: document.getElementById('regLevel').value,
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('userId', data.user_id);
        window.location.href = '/static/chat.html';
      } catch (err) {
        authError.textContent = err.message;
      } finally {
        btn.disabled = false; btn.textContent = 'Register';
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
