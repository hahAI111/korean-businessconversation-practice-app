<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c9a96e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Korean Biz Coach — Login</title>
  <link rel="stylesheet" href="/static/style.css?v=3">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand-icon">🇰🇷</div>
      <h1>Korean Biz Coach</h1>
      <p class="subtitle">Business Korean Speaking Coach</p>

      <div id="authError" class="auth-error"></div>

      <!-- Microsoft Login Button -->
      <button id="msLoginBtn" class="btn btn-microsoft" style="display:none;">
        <svg width="20" height="20" viewBox="0 0 21 21" style="margin-right:8px;vertical-align:middle;">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </button>

      <div id="divider" class="auth-divider" style="display:none;">
        <span>or</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-full" id="loginBtn">Login</button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form id="registerForm" style="display:none;">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required>
        </div>
        <div class="form-group verify-row">
          <label>Verification Code</label>
          <div style="display:flex;gap:8px;">
            <input type="text" id="regCode" placeholder="6-digit code" required maxlength="6"
                   pattern="[0-9]{6}" style="flex:1;" inputmode="numeric" autocomplete="one-time-code">
            <button type="button" class="btn btn-send-code" id="sendCodeBtn">Send Code</button>
          </div>
        </div>
        <div class="form-group">
          <label>Nickname</label>
          <input type="text" id="regNickname" placeholder="Your nickname">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 chars" required minlength="6">
        </div>
        <div class="form-group">
          <label>Korean Level</label>
          <select id="regLevel">
            <option value="beginner">Beginner (TOPIK 1-2)</option>
            <option value="intermediate" selected>Intermediate (TOPIK 3-4)</option>
            <option value="advanced">Advanced (TOPIK 5-6)</option>
          </select>
        </div>
        <button type="submit" class="btn btn-full" id="regBtn">Register</button>
      </form>

      <p class="auth-toggle">
        <span id="toggleText">Don't have an account?</span>
        <a href="#" id="toggleAuth">Register</a>
      </p>
    </div>
  </div>

  <!-- MSAL.js CDN -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script>
    // If already logged in, redirect to chat
    if (localStorage.getItem('token')) {
      window.location.href = '/static/chat.html';
    }

    // ── MSAL.js Configuration ──
    const ENTRA_CLIENT_ID = 'c72b2342-8384-445b-85b1-a48893630519';
    const ENTRA_TENANT_ID = '16b3c013-d300-468d-ac64-7eda0820b6d3';
    const REDIRECT_URI = window.location.origin;

    let msalInstance = null;
    try {
      msalInstance = new msal.PublicClientApplication({
        auth: {
          clientId: ENTRA_CLIENT_ID,
          authority: `https://login.microsoftonline.com/${ENTRA_TENANT_ID}`,
          redirectUri: REDIRECT_URI,
        },
        cache: { cacheLocation: 'sessionStorage' },
      });
      // Show Microsoft button only if MSAL loaded
      document.getElementById('msLoginBtn').style.display = 'block';
      document.getElementById('divider').style.display = 'block';

      // Handle redirect callback
      msalInstance.handleRedirectPromise().then(response => {
        if (response && response.idToken) {
          handleMicrosoftToken(response.idToken);
        }
      });
    } catch (e) {
      console.warn('MSAL init failed, Microsoft login disabled:', e);
    }

    async function handleMicrosoftToken(idToken) {
      const authError = document.getElementById('authError');
      const btn = document.getElementById('msLoginBtn');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/auth/microsoft', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id_token: idToken }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Microsoft login failed');
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('userId', data.user_id);
        window.location.href = '/static/chat.html';
      } catch (err) {
        authError.textContent = err.message;
        btn.disabled = false;
        btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 21 21" style="margin-right:8px;vertical-align:middle;"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Sign in with Microsoft';
      }
    }

    document.getElementById('msLoginBtn').addEventListener('click', async () => {
      if (!msalInstance) return;
      try {
        const response = await msalInstance.loginPopup({
          scopes: ['openid', 'profile', 'email'],
        });
        if (response.idToken) {
          handleMicrosoftToken(response.idToken);
        }
      } catch (err) {
        if (err.errorCode !== 'user_cancelled') {
          document.getElementById('authError').textContent = err.message;
        }
      }
    });

    // ── Existing email/password auth ──
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const toggleAuth = document.getElementById('toggleAuth');
    const toggleText = document.getElementById('toggleText');
    const authError = document.getElementById('authError');
    let isLogin = true;

    toggleAuth.addEventListener('click', (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      loginForm.style.display = isLogin ? 'block' : 'none';
      registerForm.style.display = isLogin ? 'none' : 'block';
      toggleText.textContent = isLogin ? 'Don\'t have an account?' : 'Already have an account?';
      toggleAuth.textContent = isLogin ? 'Register' : 'Login';
      authError.textContent = '';
    });

    async function apiCall(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Request failed');
      return data;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      authError.textContent = '';
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const data = await apiCall('/api/auth/login', {
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value,
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('userId', data.user_id);
        window.location.href = '/static/chat.html';
      } catch (err) {
        authError.textContent = err.message;
      } finally {
        btn.disabled = false; btn.textContent = 'Login';
      }
    });

    // ── Send Verification Code ──
    let codeCountdown = 0;
    document.getElementById('sendCodeBtn').addEventListener('click', async () => {
      const emailInput = document.getElementById('regEmail');
      if (!emailInput.value || !emailInput.checkValidity()) {
        authError.textContent = 'Please enter a valid email first';
        return;
      }
      if (codeCountdown > 0) return;
      const btn = document.getElementById('sendCodeBtn');
      btn.disabled = true; btn.textContent = 'Sending...';
      authError.textContent = '';
      try {
        await apiCall('/api/auth/send-code', { email: emailInput.value });
        // Start 60s countdown
        codeCountdown = 60;
        btn.textContent = `${codeCountdown}s`;
        const timer = setInterval(() => {
          codeCountdown--;
          if (codeCountdown <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.textContent = 'Send Code';
          } else {
            btn.textContent = `${codeCountdown}s`;
          }
        }, 1000);
        document.getElementById('regCode').focus();
      } catch (err) {
        authError.textContent = err.message;
        btn.disabled = false; btn.textContent = 'Send Code';
      }
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      authError.textContent = '';
      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Registering...';
      try {
        const data = await apiCall('/api/auth/register', {
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          verification_code: document.getElementById('regCode').value,
          nickname: document.getElementById('regNickname').value,
          korean_level: document.getElementById('regLevel').value,
        });
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('userId', data.user_id);
        window.location.href = '/static/chat.html';
      } catch (err) {
        authError.textContent = err.message;
      } finally {
        btn.disabled = false; btn.textContent = 'Register';
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
